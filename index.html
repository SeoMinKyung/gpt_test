<!DOCTYPE html>
<html lang="ko">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>민경 ♥ 승민 결혼합니다</title>

    <link rel="stylesheet" href="test_css.css">
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    >
</head>


<body>

<!-- 커버 -->

    <section class="cover">

        <h1>민경 ♥ 승민</h1>
        <p>2027년 5월 10일</p>
        <p>서울 웨딩홀</p>

    </section>


    <!-- 초대 문구 -->

    <section class="invitation">

        <h2>소중한 분들을 초대합니다</h2>

        <p>
        서로 다른 길을 걸어온 두 사람이<br>
        이제 같은 길을 걸어가려 합니다.<br><br>
        소중한 걸음으로 함께해 주세요.
        </p>

    </section>


    <!-- 예식 정보 -->

    <section class="info">

        <h2>예식 안내</h2>

        <div class="info-box">

            <p>날짜 : 2027년 5월 10일</p>
            <p>시간 : 오후 2시</p>
            <p>장소 : 서울 웨딩홀</p>

        </div>

        <button onclick="openMap()">길찾기</button>

    </section>


    <!-- 갤러리 -->

    <section class="gallery">
        <h2>갤러리</h2>

        <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
            <img src="image/test1.jpg" alt="gallery1">
            </div>
            <div class="swiper-slide">
            <img src="image/test2.jpg" alt="gallery2">
            </div>
            <div class="swiper-slide">
            <img src="image/test3.jpg" alt="gallery3">
            </div>
        </div>

        <!-- 하단 점 -->
        <div class="swiper-pagination"></div>

        <!-- 좌우 화살표 -->
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
        </div>
    </section>



    <!-- 마음 전하실 곳 -->

    <section class="account">

        <h2>마음 전하실 곳</h2>

        <p>신랑 계좌</p>

        <button onclick="copyAccount()">계좌번호 복사</button>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="test_script.js"></script>


    <audio id="bgm" loop>
        <source src="bgm.mp3" type="audio/mp3">
    </audio>

    <button id="musicBtn" onclick="toggleMusic()">🔊</button>
</body>
</html>
